<section class="tv-auth-shell">
  <div class="row g-4 align-items-stretch">
    <div class="col-lg-5">
      <div class="tv-panel h-100 d-flex flex-column justify-content-center">
        <div class="tv-kicker mb-3">Account Access</div>
        <h1 class="tv-section-title mb-3">Create your TRUEVISION account.</h1>
        <p class="tv-muted mb-4">
          Register to upload images, review outputs, and save your detection history.
        </p>
      </div>
    </div>

    <div class="col-lg-7">
      <div class="tv-panel h-100">
        <div class="mb-4">
          <div class="tv-pill mb-3">Register</div>
          <h2 class="fw-bold mb-2">Create Account</h2>
        </div>

        <form (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input
              type="text"
              class="form-control tv-form-control"
              placeholder="Enter your username"
              name="username"
              [(ngModel)]="username"
            />
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Email address</label>
            <input
              type="email"
              class="form-control tv-form-control"
              placeholder="Enter your email"
              name="email"
              [(ngModel)]="email"
            />
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input
              type="password"
              class="form-control tv-form-control"
              placeholder="Enter your password"
              name="password"
              [(ngModel)]="password"
            />
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm password</label>
            <input
              type="password"
              class="form-control tv-form-control"
              placeholder="Re-enter your password"
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
            />
          </div>

          <div *ngIf="errorMessage()" class="text-danger small mb-3">
            {{ errorMessage() }}
          </div>

          <div class="d-grid gap-3">
            <button type="submit" class="btn btn-tv-primary btn-lg" [disabled]="isSubmitting()">
              {{ isSubmitting() ? 'Creating account...' : 'Create Account' }}
            </button>
          </div>

          <div class="text-center mt-4">
            Already have an account?
            <a routerLink="/login" class="text-decoration-none fw-semibold">Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
